<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>entries - 蜉熵阁</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Serif SC", "Songti SC", serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #e8e6e3; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { text-align: center; margin-bottom: 40px; font-size: 2.5em; color: #ffd700; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .note { text-align: center; color: #9ca3af; margin: 30px 0; padding: 20px; background: rgba(255,215,0,0.05); border-radius: 10px; }
        .back-link { display: inline-block; margin-bottom: 30px; color: #ffd700; text-decoration: none; transition: color 0.3s; }
        .back-link:hover { color: #ffb700; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px 10px; }
            h1 { font-size: 1.8em; margin-bottom: 25px; }
            .note { padding: 15px; margin: 20px 0; font-size: 0.9em; }
            .note p { line-height: 1.8; }
            .back-link { margin-bottom: 20px; font-size: 0.9em; }
        }
        @media (max-width: 400px) {
            h1 { font-size: 1.5em; }
            .container { padding: 15px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-link">← 返回蜉熵阁</a>
        <h1>📚 entries库</h1>
        <div class="note">
            <p>entries库正在建设中...</p>
            <p style="margin-top: 15px;">
                您可以添加各类知识entries：<br>
                • 传统文化概念<br>
                • 科技名词解释<br>
                • 历史事件记录<br>
                • 科学原理说明
            </p>
        </div>
    </div>
<script>
// ==========================================
// 版权保护：复制劫持 + 开发者工具检测
// ==========================================

// 1. 复制劫持：不管复制多少，只给版权信息
document.addEventListener('copy', function(e) {
  e.preventDefault();
  const fakeText = '————————————\n' +
                   '作者：蜉蝣\n' +
                   '原文链接：' + window.location.href + '\n' +
                   '来源：foryoufsg.com\n' +
                   '————————————';
  // 写入剪贴板
  if (e.clipboardData) {
    e.clipboardData.setData('text/plain', fakeText);} 
  else if (window.clipboardData) {
    window.clipboardData.setData('Text', fakeText);}
}
);

// 2. 开发者工具检测：按F12或打开控制台就跳回首页
(function() {
  // 检测快捷键
  document.addEventListener('keydown', function(e) {
    // F12
    if (e.key === 'F12') {
      e.preventDefault();
      goHome();
      return false;
    }
    
    // Ctrl+Shift+I / Cmd+Opt+I
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'I') {
      e.preventDefault();
      goHome();
      return false;
    }
    
    // Ctrl+Shift+J / Cmd+Opt+J
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'J') {
      e.preventDefault();
      goHome();
      return false;
    }
    
    // Ctrl+U 查看源代码
    if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
      e.preventDefault();
      goHome();
      return false;
    }
    
    // Ctrl+S 保存
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      goHome();
      return false;
    }
  });
  
  // 检测控制台是否打开（通过窗口尺寸变化）
  let devToolsOpen = false;
  const threshold = 160;
  
  function check() {
    if (window.outerWidth - window.innerWidth > threshold ||
        window.outerHeight - window.innerHeight > threshold) {
      if (!devToolsOpen) {
        devToolsOpen = true;
        goHome();
      }
    } else {
      devToolsOpen = false;
    }
  }
  
  // 每秒检测一次
  setInterval(check, 1000);
  
  // 跳回首页
  function goHome() {
    window.location.href = '/';
  }
})();

</script>
</body>
</html>
