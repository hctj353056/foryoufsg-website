<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>entries - 蜉熵阁</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Serif SC", "Songti SC", serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #e8e6e3; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { text-align: center; margin-bottom: 40px; font-size: 2.5em; color: #ffd700; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .note { text-align: center; color: #9ca3af; margin: 30px 0; padding: 20px; background: rgba(255,215,0,0.05); border-radius: 10px; }
        .back-link { display: inline-block; margin-bottom: 30px; color: #ffd700; text-decoration: none; transition: color 0.3s; }
        .back-link:hover { color: #ffb700; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px 10px; }
            h1 { font-size: 1.8em; margin-bottom: 25px; }
            .note { padding: 15px; margin: 20px 0; font-size: 0.9em; }
            .note p { line-height: 1.8; }
            .back-link { margin-bottom: 20px; font-size: 0.9em; }
        }
        @media (max-width: 400px) {
            h1 { font-size: 1.5em; }
            .container { padding: 15px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-link">← 返回蜉熵阁</a>
        <h1>📚 entries库</h1>
        <div class="note">
            <p>entries库正在建设中...</p>
            <p style="margin-top: 15px;">
                您可以添加各类知识entries：<br>
                • 传统文化概念<br>
                • 科技名词解释<br>
                • 历史事件记录<br>
                • 科学原理说明
            </p>
        </div>
    </div>
<script>
// ==========================================
// 版权保护：复制劫持 + 开发者工具检测
// ==========================================
document.addEventListener("copy",function(e){e.preventDefault();const t=window.getSelection().toString();if(t.length>0){let n=t;t.length>20&&(n=t+"\n\n————————————\n作者：蜉蝣\n原文链接："+window.location.href+"\n来源：foryoufsg.com"),e.clipboardData?e.clipboardData.setData("text/plain",n):window.clipboardData&&window.clipboardData.setData("Text",n)}}),function(){document.addEventListener("keydown",function(e){if("F12"===e.key)return e.preventDefault(),void goHome();if((e.ctrlKey||e.metaKey)&&e.shiftKey&&"I"===e.key)return e.preventDefault(),void goHome();if((e.ctrlKey||e.metaKey)&&e.shiftKey&&"J"===e.key)return e.preventDefault(),void goHome();if((e.ctrlKey||e.metaKey)&&"u"===e.key)return e.preventDefault(),void goHome();if((e.ctrlKey||e.metaKey)&&"s"===e.key)return e.preventDefault(),void goHome()});let e=!1;const t=160;function n(){window.outerWidth-window.innerWidth>t||window.outerHeight-window.innerHeight>t?e||(e=!0,goHome()):e=!1}function goHome(){window.location.href="/"}setInterval(n,1e3)}();
</script>

</html>
