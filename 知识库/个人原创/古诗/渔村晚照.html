<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渔村晚照 - 蜉熰阁</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #e8e8e8; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .back-link { display: inline-block; color: #e8d5b7; text-decoration: none; padding: 10px 20px; border: 1px solid #e8d5b7; border-radius: 20px; margin-bottom: 30px; }
        .back-link:hover { background: rgba(232,213,183,0.1); }
        .poem-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 50px; text-align: center; }
        .poem-title { font-size: 2.5em; color: #e8d5b7; margin-bottom: 10px; font-weight: 300; letter-spacing: 5px; }
        .poem-type { color: #8892b0; margin-bottom: 40px; }
        .poem-body { font-size: 1.5em; line-height: 2.2; margin-bottom: 40px; }
        .poem-body p { margin-bottom: 10px; }
        .poem-analysis { background: rgba(201,169,110,0.1); border-left: 3px solid #c9a96e; padding: 25px; border-radius: 0 10px 10px 0; text-align: left; margin-top: 40px; }
        .poem-analysis h3 { color: #e8d5b7; margin-bottom: 15px; }
        .poem-analysis p { color: #b8b8c8; line-height: 1.8; }
        .poem-tags { margin-top: 30px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px; font-size: 0.9em; color: #8892b0; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回古诗列表</a>
        <div class="poem-card">
            <h1 class="poem-title">渔村晚照</h1>
            <p class="poem-type">【七言绝句】</p>
            <div class="poem-body">
                <p>夕阳西下照渔村，</p>
                <p>碧水粼粼映暮云。</p>
                <p>收网归来何所事，</p>
                <p>一壶浊酒对黄昏。</p>
            </div>
            <div class="poem-analysis">
                <h3>诗意赏析</h3>
                <p>此诗描绘渔村傍晚的宁静景象。夕阳西下，渔舟归来，碧水映照暮云，一幅恬淡的田园画卷徐徐展开。诗人以"一壶浊酒对黄昏"作结，将渔家生活的闲适与诗人内心的宁静融为一体，意境悠远，韵味深长。</p>
            </div>
            <div class="poem-tags">
                <span class="tag">渔村</span><span class="tag">傍晚</span><span class="tag">田园</span>
            </div>
        </div>
    </div>
</body>
</html>
