<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古诗 - 蜉熵阁</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Serif SC", "Songti SC", serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #e8e6e3; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { text-align: center; margin-bottom: 40px; font-size: 2.5em; color: #ffd700; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .poem-card { background: rgba(255,255,255,0.03); border-left: 4px solid #ffd700; padding: 25px; margin-bottom: 25px; border-radius: 0 12px 12px 0; transition: all 0.3s; }
        .poem-card:hover { background: rgba(255,255,255,0.06); transform: translateX(3px); }
        .poem-title { font-size: 1.8em; color: #ffd700; margin-bottom: 10px; }
        .poem-meta { font-size: 0.9em; color: #9ca3af; margin-bottom: 15px; }
        .back-link { display: inline-block; margin-bottom: 30px; color: #ffd700; text-decoration: none; transition: color 0.3s; }
        .back-link:hover { color: #ffb700; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../../index.html" class="back-link">← 返回蜉熵阁</a>
        <h1>📜 原创古诗词</h1>
        <p style="text-align: center; color: #9ca3af; margin: 30px 0;">
            共收录 51 首原创古诗词（2022-2025）<br>
            <small style="opacity: 0.7;">页面展示前 20 首</small>
        </p>
        <div class="poem-card">
            <div class="poem-title">孤</div>
            <div class="poem-meta">2022年10月31日</div>
            <p>夜间残月落叶，<br>幽道单影微凉。<br>独亭单人望月，<br>提笔留诗抒情。</p>
        </div>
        <div class="poem-card">
            <div class="poem-title">雨语</div>
            <div class="poem-meta">2023年4月4日</div>
            <p>细雨慢落雾满天，探身听雨感自然。<br>小风徐来无惊雷，恰似合一境自来。</p>
        </div>
        <div class="poem-card">
            <div class="poem-title">无题</div>
            <div class="poem-meta">2023年11月21日</div>
            <p>独亭望残月，<br>幽魂随人行。<br>地月守望助，<br>天人合一境。</p>
        </div>
    </div>
</body>
