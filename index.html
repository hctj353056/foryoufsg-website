<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜉熵阁</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e8e6e3;
            padding: 0;
        }
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.1) 0%, transparent 70%);
        }
        h1 {
            font-size: 4.5em;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
            margin-bottom: 20px;
            letter-spacing: 0.2em;
            position: relative;
            z-index: 1;
        }
        .subtitle {
            font-size: 1.8em;
            color: #e8e6e3;
            letter-spacing: 0.3em;
            opacity: 0.9;
            margin-bottom: 50px;
            position: relative;
            z-index: 1;
        }
        .nav-container {
            position: absolute;
            bottom: 60px;
            z-index: 1;
        }
        .nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-item {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,215,0,0.3);
            padding: 15px 30px;
            border-radius: 8px;
            color: #e8e6e3;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 1.1em;
        }
        .nav-item:hover {
            background: rgba(255,215,0,0.15);
            border-color: #ffd700;
            color: #ffd700;
            transform: translateY(-3px);
        }
        .nav-icon {
            font-size: 1.5em;
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.4em; letter-spacing: 0.1em; }
            .subtitle { font-size: 1.1em; letter-spacing: 0.15em; margin-bottom: 40px; padding: 0 15px; }
            .hero { height: auto; min-height: 100vh; padding: 40px 15px; }
            .nav-container { position: relative; bottom: auto; margin-top: 20px; width: 100%; padding: 0 10px; }
            .nav { flex-direction: column; gap: 12px; }
            .nav-item { width: 100%; padding: 16px 20px; font-size: 1em; text-align: center; }
        }
        @media (max-width: 400px) {
            h1 { font-size: 2em; }
            .subtitle { font-size: 0.95em; }
            .nav-item { padding: 14px 16px; font-size: 0.95em; }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            h1 { font-size: 3.5em; }
            .subtitle { font-size: 1.4em; }
            .nav-item { padding: 14px 24px; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>蜉熵阁</h1>
        <p class="subtitle">原创 · poetry · 散文 · 检索</p>
        
        <div class="nav-container">
            <div class="nav">
                <a href="knowledge-base/search-tools/" class="nav-item">
                    <span class="nav-icon">🔍</span> 搜索knowledge-base
                </a>
                <a href="knowledge-base/entries/" class="nav-item">
                    <span class="nav-icon">📚</span> entries库
                </a>
                <a href="knowledge-base/original-works/poetry/" class="nav-item">
                    <span class="nav-icon">📜</span> 原创poetry词
                </a>
                <a href="knowledge-base/original-works/articles/" class="nav-item">
                    <span class="nav-icon">✒️</span> 原创散文
                </a>
            </div>
        </div>
    </div>
<script>
// ==========================================
// 版权保护：复制劫持 + 开发者工具检测
// ==========================================

// 1. 复制劫持：不管复制多少，只给版权信息
document.addEventListener('copy', function(e) {
  e.preventDefault();
  
  const fakeText = '————————————\n' +
                   '作者：蜉蝣\n' +
                   '原文链接：' + window.location.href + '\n' +
                   '来源：foryoufsg.com\n' +
                   '————————————';
  
  // 写入剪贴板
  if (e.clipboardData) {
    e.clipboardData.setData('text/plain', fakeText);
  } else if (window.clipboardData) {
    window.clipboardData.setData('Text', fakeText);
  }
});

// 2. 开发者工具检测：按F12或打开控制台就跳回首页
(function() {
  // 检测快捷键
  document.addEventListener('keydown', function(e) {
    // F12
    if (e.key === 'F12') {
      e.preventDefault();
      goHome();
      return false;
    }
    
    // Ctrl+Shift+I / Cmd+Opt+I
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'I') {
      e.preventDefault();
      goHome();
      return false;
    }
    
    // Ctrl+Shift+J / Cmd+Opt+J
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'J') {
      e.preventDefault();
      goHome();
      return false;
    }
    
    // Ctrl+U 查看源代码
    if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
      e.preventDefault();
      goHome();
      return false;
    }
    
    // Ctrl+S 保存
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      goHome();
      return false;
    }
  });
  
  // 检测控制台是否打开（通过窗口尺寸变化）
  let devToolsOpen = false;
  const threshold = 160;
  
  function check() {
    if (window.outerWidth - window.innerWidth > threshold ||
        window.outerHeight - window.innerHeight > threshold) {
      if (!devToolsOpen) {
        devToolsOpen = true;
        goHome();
      }
    } else {
      devToolsOpen = false;
    }
  }
  
  // 每秒检测一次
  setInterval(check, 1000);
  
  // 跳回首页
  function goHome() {
    window.location.href = '/';
  }
})();
</script>
</body>
</html>

<script>
